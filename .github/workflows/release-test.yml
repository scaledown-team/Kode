name: Release Tests

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_OPTIONS: --experimental-vm-modules

jobs:
  build-and-unit:
    name: Build & Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        if: matrix.node == 20
        with:
          name: dist
          path: dist/
          retention-days: 1

  mcp-integration:
    name: MCP Protocol & Contract Tests
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run MCP integration tests
        run: npm run test:integration
        env:
          SCALEDOWN_API_KEY: test-key-ci

  config-validation:
    name: Config Format Validation
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run config format tests
        run: npm run test:config

  hook-integration:
    name: Hook Integration Tests (Claude Code headless)
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run hook integration tests
        run: npm run test:hooks
        env:
          SCALEDOWN_API_KEY: test-key-ci
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  real-api-test:
    name: Real API Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-unit
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run real API smoke tests
        run: npm run test:real
        env:
          SCALEDOWN_API_KEY: ${{ secrets.SCALEDOWN_API_KEY }}

  npm-pack-validation:
    name: npm Pack Validation
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Pack and validate tarball
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt

          # Verify required dist files are included
          grep -q "dist/src/index.js" pack-output.txt || (echo "ERROR: dist/src/index.js missing from pack" && exit 1)
          grep -q "dist/bin/setup.js" pack-output.txt || (echo "ERROR: dist/bin/setup.js missing from pack" && exit 1)
          grep -q "dist/hooks/user-prompt-submit.js" pack-output.txt || (echo "ERROR: dist/hooks/user-prompt-submit.js missing from pack" && exit 1)
          grep -q "dist/hooks/post-tool-use.js" pack-output.txt || (echo "ERROR: dist/hooks/post-tool-use.js missing from pack" && exit 1)
          grep -q "dist/hooks/pre-compact.js" pack-output.txt || (echo "ERROR: dist/hooks/pre-compact.js missing from pack" && exit 1)
          grep -q "dist/hooks/git-attribution.js" pack-output.txt || (echo "ERROR: dist/hooks/git-attribution.js missing from pack" && exit 1)
          grep -q "dist/hooks/status.js" pack-output.txt || (echo "ERROR: dist/hooks/status.js missing from pack" && exit 1)

          # Verify no .ts source files are shipped
          if grep -q "\.ts\"" pack-output.txt; then
            echo "ERROR: TypeScript source files found in pack output"
            grep "\.ts\"" pack-output.txt
            exit 1
          fi

          echo "Pack validation passed."
