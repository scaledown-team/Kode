name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --experimental-vm-modules

jobs:
  build-and-unit:
    name: Build & Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        if: matrix.node == 20
        with:
          name: dist
          path: dist/
          retention-days: 1

  mcp-integration:
    name: MCP Protocol & Contract Tests
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run MCP integration tests
        run: npm run test:integration
        env:
          SCALEDOWN_API_KEY: test-key-ci

  config-validation:
    name: Config Format Validation
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run config format tests
        run: npm run test:config

  hook-integration:
    name: Hook Integration Tests (Claude Code headless)
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run hook integration tests
        run: npm run test:hooks
        env:
          SCALEDOWN_API_KEY: test-key-ci
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
